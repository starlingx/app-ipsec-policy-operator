    cert-manager.io/inject-ca-from: ipsec-policy-operator/ipsec-policy-manager-serving-cert
    controller-gen.kubebuilder.io/version: v0.14.0
  name: ipsecpolicies.starlingx.windriver.com
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: ipsec-policy-manager-webhook-service
          namespace: ipsec-policy-operator
          path: /convert
      conversionReviewVersions:
      - v1
  group: starlingx.windriver.com
  names:
    kind: IPsecPolicy
    listKind: IPsecPolicyList
    plural: ipsecpolicies
    singular: ipsecpolicy
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: IPsecPolicy is the Schema for the ipsecpolicies API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: IPsecPolicySpec defines the desired state of IPsecPolicy
            properties:
              policies:
                items:
                  description: |-
                    Policy defines the structure to configure an IPsec policy through
                    the Service info and its protocols and ports to be protected.
                  properties:
                    name:
                      type: string
                    servicename:
                      type: string
                    servicens:
                      type: string
                    serviceports:
                      type: string
                  required:
                  - name
                  - servicename
                  - servicens
                  - serviceports
                  type: object
                type: array
            required:
            - policies
            type: object
          status:
            description: IPsecPolicyStatus defines the observed state of IPsecPolicy
            properties:
              status:
                type: string
            required:
            - status
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
