---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-starlingx-windriver-com-v1-ipsecpolicy
  failurePolicy: Fail
  name: vipsecpolicy.kb.io
  rules:
  - apiGroups:
    - starlingx.windriver.com
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - ipsecpolicies
  sideEffects: None
