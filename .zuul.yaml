---
- project:
    check:
      jobs:
        - openstack-tox-linters
        - k8sapp-ipsec-policy-operator-tox-py39
        - k8sapp-ipsec-policy-operator-tox-flake8
        - k8sapp-ipsec-policy-operator-tox-pylint
        - k8sapp-ipsec-policy-operator-tox-metadata
        - k8sapp-ipsec-policy-operator-tox-bandit
        - stx-ipsec-policy-manager-operator-tox-go-lint
        - stx-ipsec-policy-agent-operator-tox-go-lint
    gate:
      jobs:
        - openstack-tox-linters
        - k8sapp-ipsec-policy-operator-tox-py39
        - k8sapp-ipsec-policy-operator-tox-flake8
        - k8sapp-ipsec-policy-operator-tox-pylint
        - k8sapp-ipsec-policy-operator-tox-metadata
        - k8sapp-ipsec-policy-operator-tox-bandit
        - stx-ipsec-policy-manager-operator-tox-go-lint
        - stx-ipsec-policy-agent-operator-tox-go-lint
    post:
      jobs:
        - stx-app-ipsec-policy-operator-upload-git-mirror

- job:
    name: k8sapp-ipsec-policy-operator-tox-py39
    parent: openstack-tox-py39
    description: |
      Run py39 test for k8sapp-ipsec-policy-operator
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    files:
      - python3-k8sapp-ipsec-policy-operator/*
    vars:
      tox_extra_args: -c python3-k8sapp-ipsec-policy-operator/k8sapp_ipsec_policy_operator/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: k8sapp-ipsec-policy-operator-tox-flake8
    parent: tox
    description: |
      Run flake8 test for k8sapp-ipsec-policy-operator
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    files:
      - python3-k8sapp-ipsec-policy-operator/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c python3-k8sapp-ipsec-policy-operator/k8sapp_ipsec_policy_operator/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: k8sapp-ipsec-policy-operator-tox-metadata
    parent: tox
    description: |
      Run metadata test for k8sapp-ipsec-policy-operator
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    vars:
      tox_envlist: metadata
      tox_extra_args: -c python3-k8sapp-ipsec-policy-operator/k8sapp_ipsec_policy_operator/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: k8sapp-ipsec-policy-operator-tox-pylint
    parent: tox
    description: |
      Run pylint test for k8sapp-ipsec-policy-operator
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    files:
      - python3-k8sapp-ipsec-policy-operator/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c python3-k8sapp-ipsec-policy-operator/k8sapp_ipsec_policy_operator/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: k8sapp-ipsec-policy-operator-tox-bandit
    parent: tox
    description: |
      Run bandit test for k8sapp-ipsec-policy-operator
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
      - starlingx/fault
      - starlingx/utilities
      - starlingx/root
    files:
      - python3-k8sapp-ipsec-policy-operator/*
    vars:
      tox_envlist: bandit
      tox_extra_args: -c python3-k8sapp-ipsec-policy-operator/k8sapp_ipsec_policy_operator/tox.ini
      tox_constraints_file: '{{ ansible_user_dir }}/src/opendev.org/starlingx/root/build-tools/requirements/debian/upper-constraints.txt'

- job:
    name: stx-app-ipsec-policy-operator-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/app-ipsec-policy-operator to
      github.com/starlingx/app-ipsec-policy-operator
    vars:
      git_mirror_repository: starlingx/app-ipsec-policy-operator
    secrets:
      - name: git_mirror_credentials
        secret: stx-app-ipsec-policy-operator-github-secret3
        pass-to-parent: true

- job:
    name: stx-ipsec-policy-manager-operator-tox-go-lint
    parent: golangci-lint
    description: |
            Run go linting for ipsec-policy-manager-operator
    vars:
      go_version: 1.24.3
      golangci_lint_version: 2.1.6
      zuul_work_dir: "{{ zuul.project.src_dir }}/ipsec-policy-manager-operator"

- job:
    name: stx-ipsec-policy-agent-operator-tox-go-lint
    parent: golangci-lint
    description: |
            Run go linting for ipsec-policy-agent-operator
    vars:
      go_version: 1.24.3
      golangci_lint_version: 2.1.6
      zuul_work_dir: "{{ zuul.project.src_dir }}/ipsec-policy-agent-operator"

