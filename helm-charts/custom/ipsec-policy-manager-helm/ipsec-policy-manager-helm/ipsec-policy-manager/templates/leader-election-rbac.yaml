apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ipsec-policy-manager-leader-election-role
  namespace: ipsec-policy-operator
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: ipsec-policy-manager-operator
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ipsec-policy-manager-leader-election-rolebinding
  namespace: ipsec-policy-operator
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: ipsec-policy-manager-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ipsec-policy-manager-leader-election-role
subjects:
- kind: ServiceAccount
  name: ipsec-policy-manager-controller-manager
  namespace: ipsec-policy-operator
